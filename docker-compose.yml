version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: wa-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: wa_automation
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: wa-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wa-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/wa_automation
      - SECRET_KEY=acme_production_secure_handshake_token
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: wa-dashboard
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_WS_URL=ws://localhost:8080
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
